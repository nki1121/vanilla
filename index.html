<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Vanilla JS ToDo App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main id="app">

        <!-- 入力エリア -->
        <section>
            <input type="text" id="todo-input">
            <button id="add-button">追加</button>
        </section>

        <!-- リスト表示エリア -->
        <section class="list-area">
            <ul id="todo-list"></ul>
        </section>

    </main>

    <script src="script.js"></script>
</body>
</html>
